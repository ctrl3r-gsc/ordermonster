services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orderbot}
      POSTGRES_USER: ${POSTGRES_USER:-orderbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orderbot_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orderbot} -d ${POSTGRES_DB:-orderbot}"]
      interval: 5s
      timeout: 5s
      retries: 20

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./result.json:/app/result.json:ro

volumes:
  postgres_data:

